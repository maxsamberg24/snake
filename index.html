<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    #score {
      font-size: 24px;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    canvas {
      border: 2px solid #444;
      background: #111;
    }
    #message {
      margin-top: 14px;
      font-size: 16px;
      color: #aaa;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="score">SCORE: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press any arrow key to start</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, food, score, running, loop;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 0, y: 0 };
      nextDir = { x: 0, y: 0 };
      score = 0;
      running = false;
      scoreEl.textContent = 'SCORE: 0';
      messageEl.textContent = 'Press any arrow key to start';
      spawnFood();
      draw();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function start() {
      if (running) return;
      running = true;
      messageEl.textContent = '';
      loop = setInterval(tick, 120);
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = `SCORE: ${score}`;
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      messageEl.innerHTML = `Game over! Score: ${score} &nbsp;|&nbsp; Press R to restart`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grid dots
      ctx.fillStyle = '#1e1e1e';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Draw food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Draw snake
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const t = i / snake.length;
        // Yellow gradient: bright at head, darker at tail
        const r = Math.round(255 - t * 40);
        const g = Math.round(220 - t * 100);
        const b = 0;
        ctx.fillStyle = `rgb(${r},${g},${b})`;

        const padding = isHead ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * CELL + padding,
          seg.y * CELL + padding,
          CELL - padding * 2,
          CELL - padding * 2,
          isHead ? 4 : 3
        );
        ctx.fill();

        // Eyes on head
        if (isHead) {
          ctx.fillStyle = '#1a1a1a';
          const ex = seg.x * CELL;
          const ey = seg.y * CELL;
          // Position eyes based on direction
          const eyes = getEyePositions(ex, ey, dir);
          eyes.forEach(([ex2, ey2]) => {
            ctx.beginPath();
            ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
            ctx.fill();
          });
        }
      });
    }

    function getEyePositions(x, y, d) {
      const c = CELL;
      if (d.x === 1)  return [[x+c-5, y+4],  [x+c-5, y+c-5]];
      if (d.x === -1) return [[x+5,   y+4],  [x+5,   y+c-5]];
      if (d.y === -1) return [[x+4,   y+5],  [x+c-5, y+5]];
      if (d.y === 1)  return [[x+4,   y+c-5],[x+c-5, y+c-5]];
      return [[x+c-5, y+4], [x+c-5, y+c-5]]; // default facing right
    }

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; start(); break;
        case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y: 1 };  start(); break;
        case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; start(); break;
        case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  start(); break;
        case 'r': case 'R': if (!running) init(); break;
      }
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });

    init();
  </script>
</body>
</html>
